- name: High School Black Hole Project
  descr: "Within the astrophysics class I took in high school, the final project was completely of the decision of the students within a group. My group decided to make our project on Black Holes & finding an easy way to manage information about them. My role in the project was the lead programmer, and the job I took on was to create the program. Though I did not know how to do this at the time, I ended up learning how to program a small chatbot-like program that asked the user if they had questions or if they wanted information specifically on one black hole. Though the outcome seemed simple, it helped me to understand how to work a JVM in the Replit website."
#  demo: https://example.com/
  tags:
    - tag: Python

- name: YTC in Namibia
  descr: "Due to my heavy involvement within a club, called YTC (Youth Tech Corps), during my high school years, I was given a unique opportunity alongside some of the other members of the club to be able to go to Namibia and not only deliver some arduino robotics kits & refurbished computers in person but also teach the schoolchildren how they work. As the lead robotics instructor of YTC due to previous work, my job within the project was heavily involved within the robotics end of the project. Since I specialize within software instead of hardware, I took on managing the coding portion of the lessons taught.  "
  #  demo: https://example.com/
  tags:
    - tag: Arduino Uno
    - tag: C++

